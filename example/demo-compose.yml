name: shikoko-demo

services:
  db:
    build: ../docker/postgres
    container_name: shikoko-demo-db
    environment:
      POSTGRES_USER: shikoko
      POSTGRES_PASSWORD: shikoko
      POSTGRES_DB: shikoko
    ports:
      - "54324:5432"
    volumes:
      - shikoko-demo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shikoko -d shikoko"]
      interval: 1s
      timeout: 5s
      retries: 30

  app:
    build:
      context: ./app
    container_name: shikoko-demo-app
    environment:
      DATABASE_URL: postgresql://shikoko:shikoko@db:5432/shikoko
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  shikoko-demo-db-data:
