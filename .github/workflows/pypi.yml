name: Publish to PyPI

# Triggered by a `vX.Y.Z` tag (e.g. `git tag v0.5.0 && git push --tags`).
# Uploads to PyPI via Trusted Publishing (OIDC) — no API token required.
# One-time setup on PyPI:
#   https://pypi.org/manage/account/publishing/
#     PyPI project name: shikoko
#     Owner:             Tkeby
#     Repository:        shikoko
#     Workflow filename: pypi.yml
#     Environment:       pypi

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${tag}" != "${pkg}" ]; then
            echo "::error::Tag v${tag} does not match pyproject.toml version ${pkg}"
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check --strict dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/shikoko
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
